<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Job Search — Kanban</title>
<style>
  :root {
    --bg: #eef1f5; --panel: #ffffff; --panel2: #f5f7fa; --text: #1b2230;
    --muted: #667085; --border: #dce1e9; --accent: #2f6fed;
    --submitted: #2f6fed; --interviewing: #12a370; --in_progress: #d68a00; --stalled: #8a93a6; --closed: #d6455f; --other: #7b52e0;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font: 14px/1.45 system-ui, "Segoe UI", Roboto, sans-serif; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
    border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 5; }
  header h1 { font-size: 17px; margin: 0; font-weight: 650; }
  header .total { color: var(--muted); font-size: 13px; }
  header .spacer { flex: 1; }
  button { font: inherit; color: var(--text); background: var(--panel);
    border: 1px solid var(--border); border-radius: 7px; padding: 7px 12px; cursor: pointer; }
  button:hover { border-color: var(--accent); }
  #board { display: grid; gap: 14px; padding: 18px 20px; align-items: start; }
  .col { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; min-height: 120px;
    display: flex; flex-direction: column; min-width: 0; box-shadow: 0 1px 2px rgba(16,24,40,.04); }
  .col.drop { outline: 2px dashed var(--accent); outline-offset: -2px; }
  .col.col-dragging { opacity: .45; }
  .col-head { display: flex; align-items: center; gap: 8px; padding: 12px 14px; border-bottom: 1px solid var(--border);
    font-weight: 600; cursor: grab; user-select: none; }
  .col-head:active { cursor: grabbing; }
  .col-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .col-head .count { margin-left: auto; color: var(--muted); font-weight: 500; }
  .collapse-btn { padding: 0 5px; line-height: 1; background: transparent; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }
  .collapse-btn:hover { color: var(--accent); }
  /* collapsed column: narrow, vertical header, cards hidden, others fill the space */
  .col.collapsed { min-height: 190px; cursor: pointer; }
  .col.collapsed .cards { display: none; }
  .col.collapsed .col-head { flex: 1; flex-direction: column; gap: 10px; border-bottom: none; padding: 12px 4px; }
  .col.collapsed .col-label { writing-mode: vertical-rl; transform: rotate(180deg); }
  .col.collapsed .count { margin: 0; }
  .cards { padding: 10px; display: flex; flex-direction: column; gap: 9px; min-height: 40px; }
  .card { background: var(--panel2); border: 1px solid var(--border); border-left-width: 3px;
    border-radius: 9px; padding: 10px 11px; cursor: grab; }
  .card:active { cursor: grabbing; }
  .card.dragging { opacity: .45; }
  .card .co { font-weight: 640; }
  .card .role { color: var(--muted); font-size: 13px; margin-top: 1px; }
  .card .meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 7px; font-size: 11.5px; color: var(--muted); }
  .card .tag { background: var(--bg); border: 1px solid var(--border); border-radius: 5px; padding: 1px 6px; }
  .empty { color: var(--muted); font-size: 12.5px; text-align: center; padding: 14px 8px; }
  /* modal */
  .overlay { position: fixed; inset: 0; background: rgba(16,24,40,.45); display: none; align-items: center; justify-content: center; z-index: 20; }
  .overlay.open { display: flex; }
  .modal { background: var(--panel); border: 1px solid var(--border); border-radius: 14px; width: min(920px, 95vw); height: 90vh; display: flex; flex-direction: column; box-shadow: 0 12px 40px rgba(16,24,40,.18); }
  .modal-head { display: flex; align-items: center; gap: 12px; padding: 16px 22px; margin-bottom: 0; border-bottom: 1px solid var(--border); flex: 0 0 auto; }
  .modal-head > div:first-child { flex: 1; }
  .modal h2 { margin: 0 0 2px; font-size: 18px; }
  .modal .sub { color: var(--muted); }
  .modal-x { margin-left: auto; background: transparent; border: none; font-size: 22px; line-height: 1; color: var(--muted); cursor: pointer; padding: 0 4px; }
  .modal-x:hover { color: var(--text); }
  .modal-body { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; padding: 20px 22px; overflow: auto; flex: 1 1 auto; }
  .modal-left, .modal-right { min-width: 0; }
  .modal-head button { padding: 7px 12px; font-size: 13px; }
  .modal-head .btn-primary { margin-left: 8px; }
  .modal-head .modal-x { margin-left: auto; }
  .section-title { font-weight: 650; font-size: 12px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 2px 0 10px; }
  .stub { color: var(--muted); border: 1px dashed var(--border); border-radius: 10px; padding: 18px; text-align: center; font-size: 13px; margin-bottom: 18px; }
  .toggle-more { background: transparent; border: none; color: var(--accent); cursor: pointer; padding: 4px 0 0; font-size: 12px; }
  .check-inline { display: flex; align-items: center; gap: 8px; }
  .check-inline input[type=checkbox] { width: 16px; height: 16px; flex: none; margin: 0; }
  .check-inline label { margin: 0 !important; }
  @media (max-width: 720px) { .modal-body { grid-template-columns: 1fr; } }
  /* checklist */
  #checklist { font-size: 13.5px; }
  .cl-list { display: flex; flex-direction: column; gap: 1px; }
  .cl-item { display: flex; align-items: center; gap: 7px; padding: 3px 4px; border-radius: 6px; }
  .cl-item:hover { background: var(--panel2); }
  .cl-item.dragging { opacity: .4; }
  .cl-item.child { margin-left: 26px; }
  .cl-grip { color: var(--muted); cursor: grab; flex: none; font-size: 12px; opacity: .45; letter-spacing: -2px; }
  .cl-grip:active { cursor: grabbing; }
  .cl-box { width: 16px; height: 16px; border: 2px solid var(--muted); border-radius: 4px; cursor: pointer; flex: none;
    display: inline-flex; align-items: center; justify-content: center; box-sizing: border-box; }
  .cl-box.inprogress { background: var(--accent); border-color: var(--accent); }
  .cl-box.done { background: var(--accent); border-color: var(--accent); }
  .cl-box.done::after { content: '✓'; color: #fff; font-size: 11px; line-height: 1; }
  .cl-text { flex: 1; border: none; background: transparent; color: var(--text); font: inherit; padding: 2px 4px; border-radius: 4px; min-width: 0; }
  .cl-text:focus { outline: 1px solid var(--border); background: #fff; }
  .cl-item.done-item .cl-text { text-decoration: line-through; color: var(--muted); }
  .cl-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; padding: 0 3px; font-size: 14px; flex: none; opacity: 0; line-height: 1; }
  .cl-item:hover .cl-btn { opacity: 1; }
  .cl-btn:hover { color: var(--text); }
  .cl-add { display: flex; gap: 8px; margin-top: 8px; }
  .cl-add input { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font: inherit; background: #fff; color: var(--text); min-width: 0; }
  .cl-completed-header { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); margin: 16px 0 6px; border-top: 1px solid var(--border); padding-top: 10px; }
  .cl-empty { color: var(--muted); font-size: 12.5px; padding: 4px; }
  /* comments */
  #comments { font-size: 13px; }
  .cm-toolbar { display: flex; flex-wrap: wrap; gap: 2px; padding: 6px; background: var(--panel2); border: 1px solid var(--border);
    border-radius: 6px; margin-bottom: 8px; }
  .cm-btn { background: transparent; border: 1px solid var(--border); border-radius: 5px; padding: 4px 7px; cursor: pointer;
    font-size: 12px; color: var(--text); line-height: 1; }
  .cm-btn:hover { background: var(--panel); border-color: var(--accent); }
  .cm-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .cm-sep { width: 1px; background: var(--border); margin: 0 2px; }
  .cm-editor { min-height: 70px; padding: 8px; background: #fff; border: 1px solid var(--border); border-radius: 6px;
    color: var(--text); font-family: inherit; font-size: 13px; line-height: 1.5; overflow-y: auto; outline: none; }
  .cm-editor:focus { border-color: var(--accent); }
  .cm-editor b, .cm-editor strong { font-weight: 700; }
  .cm-editor i, .cm-editor em { font-style: italic; }
  .cm-editor u { text-decoration: underline; }
  .cm-editor s, .cm-editor strike { text-decoration: line-through; }
  .cm-editor ul, .cm-editor ol { margin: 6px 0 6px 20px; }
  .cm-actions { display: flex; gap: 8px; margin-top: 6px; }
  .cm-actions button { padding: 6px 12px; font-size: 12px; }
  .cm-list { display: flex; flex-direction: column-reverse; gap: 8px; }
  .cm-item { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 8px; }
  .cm-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
  .cm-item .cm-meta { font-size: 11px; color: var(--muted); }
  .cm-item-actions { display: flex; gap: 6px; }
  .cm-item-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0 3px; }
  .cm-item-btn:hover { color: var(--text); }
  .cm-item .cm-text { font-size: 12.5px; line-height: 1.5; }
  .cm-empty { color: var(--muted); font-size: 12.5px; padding: 4px; }
  /* events */
  #events { font-size: 13px; }
  .ev-add { display: flex; gap: 8px; margin-bottom: 12px; }
  .ev-add input[type=date] { flex: 0 0 120px; border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font: inherit; background: #fff; color: var(--text); }
  .ev-add input[type=text] { flex: 1; border: 1px solid var(--border); border-radius: 6px; padding: 6px 9px; font: inherit; background: #fff; color: var(--text); min-width: 0; }
  .ev-add button { padding: 6px 12px; font-size: 12px; }
  .ev-list { display: flex; flex-direction: column; gap: 8px; }
  .ev-item { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
  .ev-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
  .ev-date { font-weight: 600; font-size: 13px; color: var(--accent); }
  .ev-note { font-size: 13px; color: var(--text); line-height: 1.4; }
  .ev-actions { display: flex; gap: 6px; }
  .ev-btn { background: transparent; border: none; color: var(--muted); cursor: pointer; font-size: 12px; padding: 0 3px; }
  .ev-btn:hover { color: var(--text); }
  .ev-empty { color: var(--muted); font-size: 12.5px; padding: 4px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em; }
  .field input, .field select, .field textarea { width: 100%; background: #fff; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; padding: 9px 10px; font: inherit; }
  .field textarea { min-height: 90px; resize: vertical; }
  .row { display: flex; gap: 12px; }
  .row .field { flex: 1; }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-danger { color: var(--closed); }
  a { color: var(--accent); }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: #1b2230; color: #fff; border: 1px solid #1b2230; border-radius: 8px; padding: 9px 15px;
    opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 30; }
  .toast.show { opacity: 1; }
  /* search bar */
  #search-bar { display: flex; align-items: center; gap: 12px; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--bg); position: sticky; top: 48px; z-index: 5; }
  #search-bar input { flex: 1; max-width: 400px; padding: 8px 12px; border: 1px solid var(--border); border-radius: 8px; font: inherit; color: var(--text); background: #fff; }
  #search-bar input:focus { outline: none; border-color: var(--accent); }
  #search-bar button { padding: 7px 12px; font-size: 13px; }
  .search-result-count { color: var(--muted); font-size: 13px; }
  /* advanced search modal */
  #advanced-search-modal { display: none; }
  #advanced-search-modal.open { display: flex; }
  #advanced-search-modal .modal { width: min(1200px, 95vw); max-height: 90vh; }
  .search-filters { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 14px; margin-bottom: 20px; }
  .search-results-grid { overflow-x: auto; width: 100%; }
  .search-results-grid table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .search-results-grid th { background: var(--panel2); border: 1px solid var(--border); padding: 10px; text-align: left; font-weight: 600; cursor: pointer; user-select: none; }
  .search-results-grid th:hover { background: var(--bg); }
  .search-results-grid th.sorted::after { content: ' ▼'; font-size: 10px; }
  .search-results-grid td { border: 1px solid var(--border); padding: 10px; }
  .search-results-grid tr:hover { background: var(--panel2); }
  .search-results-grid tr:nth-child(even) { background: #fafbfc; }
  .search-results-grid tbody tr { cursor: pointer; }
  .search-results-grid tbody tr:hover { background: var(--border); }
</style>
</head>
<body>
<header>
  <h1>Job Search — Kanban</h1>
  <span class="total" id="total"></span>
  <span class="spacer"></span>
  <button onclick="openNewModal()" style="background:var(--accent);color:#fff;border-color:var(--accent)">+ New</button>
  <button onclick="load()">↻ Refresh</button>
</header>

<div id="search-bar">
  <input type="text" id="quick-search-input" placeholder="Search by company, role, or JD..." autocomplete="off">
  <button onclick="clearQuickSearch()">Clear</button>
  <button onclick="openAdvancedSearch()" style="color:var(--accent)">Advanced Search</button>
  <span class="search-result-count" id="search-count"></span>
</div>

<div id="board"></div>

<div class="overlay" id="advanced-search-modal" onclick="if(event.target===this)closeAdvancedSearch()">
  <div class="modal">
    <div class="modal-head">
      <div><h2>Advanced Search</h2></div>
      <button class="modal-x" onclick="closeAdvancedSearch()" title="Close">&times;</button>
    </div>
    <div class="search-filters">
      <div class="field"><label>Company</label><input id="asearch-company" placeholder="Search company"></div>
      <div class="field"><label>Job Title</label><input id="asearch-role" placeholder="Search role"></div>
      <div class="field"><label>JD Text</label><input id="asearch-jd" placeholder="Search job description"></div>
      <div class="field"><label>Status</label><select id="asearch-status"><option value="">All statuses</option><option value="submitted">Submitted</option><option value="interviewing">Interviewing</option><option value="in_progress">In Progress</option><option value="stalled">Stalled</option><option value="closed">Closed</option></select></div>
      <div class="field"><label>From Date</label><input id="asearch-from" type="date"></div>
      <div class="field"><label>To Date</label><input id="asearch-to" type="date"></div>
    </div>
    <div id="search-results-container" style="margin-bottom:20px">
      <div style="color:var(--muted);font-size:13px;margin-bottom:10px">Results: <span id="asearch-count">0</span></div>
      <div class="search-results-grid" id="search-results-grid"></div>
    </div>
    <div class="modal-actions">
      <button onclick="closeAdvancedSearch()">Close</button>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const STATUSES = [
  { key: 'submitted',    label: 'Submitted' },
  { key: 'interviewing', label: 'Interviewing' },
  { key: 'in_progress',  label: 'In Progress' },
  { key: 'stalled',     label: 'Stalled' },
  { key: 'closed',      label: 'Closed' },
];
const CANON = STATUSES.map(s => s.key);
let APPS = [];

// Canonical columns first, then a column for any out-of-spec status found in the
// data (e.g. "interviewing") so no card is ever hidden. Skip null/undefined statuses.
function columns() {
  const extra = [...new Set(APPS.map(a => a.status))].filter(s => s && !CANON.includes(s));
  return [
    ...STATUSES,
    ...extra.map(k => ({ key: k, label: k.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), extra: true })),
  ];
}
const colorFor = k => CANON.includes(k) ? `var(--${k})` : 'var(--other)';

// --- column order + collapse state (persisted in the browser) ---
let COL_ORDER = JSON.parse(localStorage.getItem('kbColOrder') || 'null');
const COLLAPSED = new Set(JSON.parse(localStorage.getItem('kbCollapsed') || '[]'));

// Apply the saved order, drop stale keys, and append any new columns at the end.
function orderedColumns() {
  const cols = columns();
  const byKey = Object.fromEntries(cols.map(c => [c.key, c]));
  const order = (COL_ORDER || []).filter(k => byKey[k]);
  for (const c of cols) if (!order.includes(c.key)) order.push(c.key);
  return order.map(k => byKey[k]).filter(c => c);  // drop any null/undefined columns
}
function reorderColumns(fromKey, toKey) {
  if (fromKey === toKey) return;
  const order = orderedColumns().map(c => c.key).filter(k => k !== fromKey);
  order.splice(order.indexOf(toKey), 0, fromKey);
  COL_ORDER = order;
  localStorage.setItem('kbColOrder', JSON.stringify(order));
  render();
}
function toggleCollapse(key) {
  COLLAPSED.has(key) ? COLLAPSED.delete(key) : COLLAPSED.add(key);
  localStorage.setItem('kbCollapsed', JSON.stringify([...COLLAPSED]));
  render();
}

let drag = null; // {kind:'card', id} | {kind:'col', key}
let SEARCH_FILTER = null; // null = show all, otherwise filter by this set of IDs
let SEARCH_SORT = { field: 'date_applied', order: 'desc' }; // for advanced search grid

const fmtDate = d => d ? String(d).slice(0, 10) : '—';
const esc = s => (s == null ? '' : String(s)).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function load() {
  const res = await fetch('/api/applications');
  APPS = await res.json();
  SEARCH_FILTER = null;
  document.getElementById('quick-search-input').value = '';
  updateSearchCount();
  render();
}

// --- Quick Search ---
function getSearchableText(app) {
  return `${app.company} ${app.role} ${app.jd_text || ''}`.toLowerCase();
}

function debounce(fn, ms) {
  let timeout;
  return (...args) => {
    clearTimeout(timeout);
    timeout = setTimeout(() => fn(...args), ms);
  };
}

const performQuickSearch = debounce(() => {
  const query = document.getElementById('quick-search-input').value.trim().toLowerCase();
  if (!query) {
    SEARCH_FILTER = null;
  } else {
    SEARCH_FILTER = new Set(APPS.filter(a => getSearchableText(a).includes(query)).map(a => a.id));
  }
  updateSearchCount();
  render();
}, 300);

function clearQuickSearch() {
  document.getElementById('quick-search-input').value = '';
  SEARCH_FILTER = null;
  updateSearchCount();
  render();
}

function updateSearchCount() {
  const el = document.getElementById('search-count');
  if (!SEARCH_FILTER) {
    el.textContent = '';
  } else {
    el.textContent = `${SEARCH_FILTER.size} of ${APPS.length}`;
  }
}

// --- Advanced Search ---
function openAdvancedSearch() {
  document.getElementById('advanced-search-modal').classList.add('open');
  performAdvancedSearch();
}

function closeAdvancedSearch() {
  document.getElementById('advanced-search-modal').classList.remove('open');
}

async function performAdvancedSearch() {
  const company = document.getElementById('asearch-company').value.trim();
  const role = document.getElementById('asearch-role').value.trim();
  const jd_text = document.getElementById('asearch-jd').value.trim();
  const status = document.getElementById('asearch-status').value.trim();
  const date_from = document.getElementById('asearch-from').value.trim();
  const date_to = document.getElementById('asearch-to').value.trim();

  const params = new URLSearchParams();
  if (company) params.append('company', company);
  if (role) params.append('role', role);
  if (jd_text) params.append('jd_text', jd_text);
  if (status) params.append('status', status);
  if (date_from) params.append('date_from', date_from);
  if (date_to) params.append('date_to', date_to);

  try {
    const res = await fetch(`/api/applications/search?${params.toString()}`);
    const results = await res.json();
    renderSearchResults(results);
  } catch (e) {
    toast('Search error: ' + e.message);
  }
}

function renderSearchResults(results) {
  const count = document.getElementById('asearch-count');
  count.textContent = results.length;

  const container = document.getElementById('search-results-grid');
  if (results.length === 0) {
    container.innerHTML = '<div style="padding:20px;text-align:center;color:var(--muted)">No results found</div>';
    return;
  }

  // Sort results
  const sorted = [...results].sort((a, b) => {
    let aVal = a[SEARCH_SORT.field];
    let bVal = b[SEARCH_SORT.field];
    if (aVal == null) aVal = '';
    if (bVal == null) bVal = '';
    const cmp = String(aVal).localeCompare(String(bVal));
    return SEARCH_SORT.order === 'asc' ? cmp : -cmp;
  });

  const thead = `
    <thead>
      <tr>
        <th onclick="setSortField('company')">Company ${SEARCH_SORT.field === 'company' ? '▼' : ''}</th>
        <th onclick="setSortField('role')">Job Title ${SEARCH_SORT.field === 'role' ? '▼' : ''}</th>
        <th onclick="setSortField('date_applied')">Applied ${SEARCH_SORT.field === 'date_applied' ? '▼' : ''}</th>
        <th>Status</th>
      </tr>
    </thead>
  `;

  const tbody = `
    <tbody>
      ${sorted.map(a => `
        <tr onclick="openModal(APPS.find(x => x.id === ${a.id}))">
          <td>${esc(a.company)}</td>
          <td>${esc(a.role)}</td>
          <td>${fmtDate(a.date_applied)}</td>
          <td><span class="tag" style="background:${colorFor(a.status)};color:#fff;border:none">${a.status}</span></td>
        </tr>
      `).join('')}
    </tbody>
  `;

  container.innerHTML = `<table>${thead}${tbody}</table>`;
}

function setSortField(field) {
  if (SEARCH_SORT.field === field) {
    SEARCH_SORT.order = SEARCH_SORT.order === 'asc' ? 'desc' : 'asc';
  } else {
    SEARCH_SORT.field = field;
    SEARCH_SORT.order = 'asc';
  }
  performAdvancedSearch();
}

function render() {
  document.getElementById('total').textContent = `${APPS.length} applications`;
  const board = document.getElementById('board');
  board.innerHTML = '';
  const cols = orderedColumns();
  board.style.gridTemplateColumns = cols.map(c => COLLAPSED.has(c.key) ? '48px' : 'minmax(0,1fr)').join(' ');
  for (const s of cols) {
    const collapsed = COLLAPSED.has(s.key);
    let items = APPS.filter(a => a.status === s.key);
    if (SEARCH_FILTER) items = items.filter(a => SEARCH_FILTER.has(a.id));
    const col = document.createElement('div');
    col.className = 'col' + (collapsed ? ' collapsed' : '');
    col.dataset.status = s.key;

    const head = document.createElement('div');
    head.className = 'col-head';
    head.draggable = true;
    head.innerHTML =
      `<span class="dot" style="background:${colorFor(s.key)}"></span>` +
      `<span class="col-label">${s.label}</span>` +
      `<span class="count">${items.length}</span>` +
      `<button class="collapse-btn" title="${collapsed ? 'Expand' : 'Collapse'}">${collapsed ? '›' : '‹'}</button>`;
    head.querySelector('.collapse-btn').addEventListener('click', e => { e.stopPropagation(); toggleCollapse(s.key); });
    head.addEventListener('click', () => { if (collapsed) toggleCollapse(s.key); });
    head.addEventListener('dragstart', e => {
      drag = { kind: 'col', key: s.key }; col.classList.add('col-dragging');
      e.dataTransfer.setData('text/plain', 'col:' + s.key); e.dataTransfer.effectAllowed = 'move';
    });
    head.addEventListener('dragend', () => { col.classList.remove('col-dragging'); drag = null; });
    col.appendChild(head);

    const cards = document.createElement('div');
    cards.className = 'cards';
    if (!items.length) cards.innerHTML = '<div class="empty">no cards</div>';
    for (const a of items) cards.appendChild(cardEl(a, s.key));
    col.appendChild(cards);

    // drop target — either a card (change status) or a column header (reorder)
    col.addEventListener('dragover', e => { e.preventDefault(); col.classList.add('drop'); });
    col.addEventListener('dragleave', () => col.classList.remove('drop'));
    col.addEventListener('drop', e => {
      e.preventDefault(); col.classList.remove('drop');
      if (!drag) return;
      if (drag.kind === 'col') { reorderColumns(drag.key, s.key); }
      else if (drag.kind === 'card') {
        const app = APPS.find(a => a.id === drag.id);
        if (app && app.status !== s.key) save(drag.id, { status: s.key }, `${app.company} → ${s.label}`);
      }
    });
    board.appendChild(col);
  }
}

// ---------- Checklist (stored in the todos JSONB) ----------
let modalApp = null, MTODOS = [], clDrag = null;
const uid = () => Math.random().toString(36).slice(2, 12);

function normalizeTodos(arr) {
  const norm = it => ({ id: it.id || uid(), text: it.text || '', completed: !!it.completed,
    completedAt: it.completedAt || null, inProgress: !!it.inProgress });
  return (arr || []).map(it => ({ ...norm(it), subtasks: (it.subtasks || []).map(norm) }));
}
function setState(item, s) {
  item.completed = s === 'done';
  item.inProgress = s === 'in_progress';
  item.completedAt = s === 'done' ? (item.completedAt || new Date().toISOString()) : null;
}
function cycle(item) {                                   // tri-state: todo → in-progress → done → todo
  if (item.completed) setState(item, 'todo');
  else if (item.inProgress) setState(item, 'done');
  else setState(item, 'in_progress');
}
function recomputeParent(p) {                            // parent state derived from its children
  const kids = p.subtasks || [];
  if (!kids.length) return;
  const allDone = kids.every(k => k.completed);
  const anyStarted = kids.some(k => k.completed || k.inProgress);
  p.completed = allDone;
  p.completedAt = allDone ? (p.completedAt || new Date().toISOString()) : null;
  p.inProgress = !allDone && anyStarted;
}
function onCheck(item, parent) {
  if (parent) {                                          // child: cycle, then roll up to parent
    cycle(item);
    recomputeParent(parent);
  } else if (item.subtasks && item.subtasks.length) {    // parent w/ children: complete-all / reset-all
    const target = item.completed ? 'todo' : 'done';
    item.subtasks.forEach(k => setState(k, target));
    recomputeParent(item);
  } else {                                               // leaf top-level: cycle
    cycle(item);
  }
  saveTodos();
}
function addTopItem() {
  const inp = document.getElementById('cl-add-input');
  const t = inp.value.trim();
  if (!t) return;
  MTODOS.push({ id: uid(), text: t, completed: false, completedAt: null, inProgress: false, subtasks: [] });
  inp.value = '';
  saveTodos();
  const ni = document.getElementById('cl-add-input'); if (ni) ni.focus();
}
function addSubItem(parent) {
  parent.subtasks = parent.subtasks || [];
  const child = { id: uid(), text: '', completed: false, completedAt: null, inProgress: false };
  parent.subtasks.push(child);
  recomputeParent(parent);
  renderChecklist();                                     // local only; persists once text is entered
  setTimeout(() => { const el = document.querySelector(`.cl-item[data-id="${child.id}"] .cl-text`); if (el) el.focus(); }, 0);
}
function removeItem(item, parent) {
  if (parent) { parent.subtasks = (parent.subtasks || []).filter(s => s.id !== item.id); recomputeParent(parent); }
  else { MTODOS = MTODOS.filter(t => t.id !== item.id); }
}
function reorderWithin(parentId, fromId, toId) {
  const arr = parentId ? (MTODOS.find(t => t.id === parentId) || {}).subtasks || [] : MTODOS;
  const fi = arr.findIndex(x => x.id === fromId), ti = arr.findIndex(x => x.id === toId);
  if (fi < 0 || ti < 0 || fi === ti) return;
  const [m] = arr.splice(fi, 1);
  arr.splice(ti, 0, m);
  saveTodos();
}
function itemRow(item, parent) {
  const row = document.createElement('div');
  row.className = 'cl-item' + (parent ? ' child' : '') + (item.completed ? ' done-item' : '');
  row.dataset.id = item.id;

  const grip = document.createElement('span');
  grip.className = 'cl-grip'; grip.textContent = '⠿'; grip.draggable = true;
  grip.addEventListener('dragstart', e => {
    clDrag = { id: item.id, parent: parent ? parent.id : '' }; row.classList.add('dragging');
    e.dataTransfer.setData('text/plain', item.id); e.dataTransfer.effectAllowed = 'move';
  });
  grip.addEventListener('dragend', () => { row.classList.remove('dragging'); clDrag = null; });

  const box = document.createElement('span');
  box.className = 'cl-box' + (item.completed ? ' done' : (item.inProgress ? ' inprogress' : ''));
  box.addEventListener('click', () => onCheck(item, parent));

  const input = document.createElement('input');
  input.className = 'cl-text'; input.value = item.text; input.placeholder = 'List item…';
  input.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); input.blur(); } });
  input.addEventListener('change', () => { item.text = input.value.trim(); if (!item.text) removeItem(item, parent); saveTodos(); });

  row.append(grip, box, input);
  if (!parent) {
    const addSub = document.createElement('button');
    addSub.className = 'cl-btn'; addSub.textContent = '＋'; addSub.title = 'Add sub-item';
    addSub.addEventListener('click', () => addSubItem(item));
    row.append(addSub);
  }
  const del = document.createElement('button');
  del.className = 'cl-btn'; del.textContent = '×'; del.title = 'Delete';
  del.addEventListener('click', () => { removeItem(item, parent); saveTodos(); });
  row.append(del);

  row.addEventListener('dragover', e => { if (clDrag) e.preventDefault(); });
  row.addEventListener('drop', e => {
    e.preventDefault();
    if (!clDrag) return;
    if (clDrag.parent !== (parent ? parent.id : '')) return;   // reorder within the same level only
    reorderWithin(parent ? parent.id : '', clDrag.id, item.id);
  });
  return row;
}
function renderList(container, items) {
  for (const it of items) {
    container.appendChild(itemRow(it, null));
    for (const k of (it.subtasks || [])) container.appendChild(itemRow(k, it));
  }
}
function renderChecklist() {
  const c = document.getElementById('checklist');
  if (!c) return;
  c.innerHTML = '';
  const active = MTODOS.filter(t => !t.completed);
  const done = MTODOS.filter(t => t.completed);

  const list = document.createElement('div');
  list.className = 'cl-list';
  if (!active.length && !done.length) list.innerHTML = '<div class="cl-empty">No checklist items yet.</div>';
  renderList(list, active);
  c.appendChild(list);

  const add = document.createElement('div');
  add.className = 'cl-add';
  add.innerHTML = '<input id="cl-add-input" placeholder="Add checklist item…">';
  const btn = document.createElement('button');
  btn.className = 'btn-primary'; btn.textContent = 'Add'; btn.style.padding = '6px 12px';
  btn.addEventListener('click', addTopItem);
  add.querySelector('input').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTopItem(); } });
  add.appendChild(btn);
  c.appendChild(add);

  if (done.length) {
    const h = document.createElement('div');
    h.className = 'cl-completed-header'; h.textContent = `Completed (${done.length})`;
    c.appendChild(h);
    const dlist = document.createElement('div');
    dlist.className = 'cl-list';
    renderList(dlist, done);
    c.appendChild(dlist);
  }
}
async function saveTodos() {
  renderChecklist();
  try {
    const res = await fetch(`/api/applications/${modalApp.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ todos: MTODOS }),
    });
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    const inApps = APPS.find(x => x.id === modalApp.id); if (inApps) inApps.todos = MTODOS;
  } catch (e) { toast('Checklist save failed: ' + e.message); }
}

// ---------- Events (stored in a separate events table) ----------
let MEVENTS = [];

async function loadEvents(appId) {
  try {
    const res = await fetch(`/api/events/${appId}`);
    MEVENTS = await res.json();
  } catch (e) {
    console.error('Failed to load events:', e);
    MEVENTS = [];
  }
}

function renderEvents() {
  const e = document.getElementById('events');
  if (!e) return;
  e.innerHTML = '';

  // add new event form
  const addForm = document.createElement('div');
  addForm.className = 'ev-add';
  const dateInput = document.createElement('input');
  dateInput.type = 'date';
  dateInput.id = 'ev-date';
  const noteInput = document.createElement('input');
  noteInput.type = 'text';
  noteInput.id = 'ev-note';
  noteInput.placeholder = 'e.g., Phone Screen';
  const addBtn = document.createElement('button');
  addBtn.textContent = 'Add';
  addBtn.type = 'button';
  addBtn.addEventListener('click', () => addEvent());
  addForm.append(dateInput, noteInput, addBtn);
  e.appendChild(addForm);

  // events list (newest first)
  const list = document.createElement('div');
  list.className = 'ev-list';
  if (!MEVENTS.length) list.innerHTML = '<div class="ev-empty">No events yet.</div>';
  [...MEVENTS].sort((a, b) => new Date(b.event_date) - new Date(a.event_date)).forEach(ev => {
    const item = document.createElement('div');
    item.className = 'ev-item';

    const header = document.createElement('div');
    header.className = 'ev-item-header';
    const date = document.createElement('div');
    date.className = 'ev-date';
    date.textContent = fmtDate(ev.event_date);
    const actions = document.createElement('div');
    actions.className = 'ev-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'ev-btn';
    editBtn.textContent = '✎';
    editBtn.title = 'Edit';
    editBtn.addEventListener('click', () => editEvent(ev));

    const delBtn = document.createElement('button');
    delBtn.className = 'ev-btn';
    delBtn.textContent = '✕';
    delBtn.title = 'Delete';
    delBtn.addEventListener('click', () => deleteEvent(ev.id));

    actions.append(editBtn, delBtn);
    header.append(date, actions);

    const note = document.createElement('div');
    note.className = 'ev-note';
    note.textContent = ev.note;

    item.append(header, note);
    list.appendChild(item);
  });
  e.appendChild(list);
}

async function addEvent() {
  const dateInput = document.getElementById('ev-date');
  const noteInput = document.getElementById('ev-note');
  const date = dateInput.value;
  const note = noteInput.value.trim();
  if (!date || !note) return;
  try {
    const res = await fetch('/api/events', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ app_id: modalApp.id, event_date: date, note }),
    });
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    const newEvent = await res.json();
    MEVENTS.push(newEvent);
    dateInput.value = '';
    noteInput.value = '';
    renderEvents();
  } catch (e) {
    toast('Event add failed: ' + e.message);
  }
}

function editEvent(ev) {
  const dateInput = document.getElementById('ev-date');
  const noteInput = document.getElementById('ev-note');
  dateInput.value = ev.event_date;
  noteInput.value = ev.note;
  noteInput.focus();
  MEVENTS = MEVENTS.filter(e => e.id !== ev.id);
  renderEvents();
}

async function deleteEvent(evId) {
  if (!confirm('Delete this event?')) return;
  try {
    const res = await fetch(`/api/events/${evId}`, { method: 'DELETE' });
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    MEVENTS = MEVENTS.filter(e => e.id !== evId);
    renderEvents();
  } catch (e) {
    toast('Event delete failed: ' + e.message);
  }
}

function fmtTime(iso) {

  c.appendChild(actions);

  // comments list (newest first)
  const list = document.createElement('div');
  list.className = 'cm-list';
  if (!MCOMMENTS.length) list.innerHTML = '<div class="cm-empty">No comments yet.</div>';
  MCOMMENTS.forEach(cm => {
    const item = document.createElement('div');
    item.className = 'cm-item';

    // header: timestamp + edit/delete buttons
    const header = document.createElement('div');
    header.className = 'cm-item-header';
    const meta = document.createElement('div');
    meta.className = 'cm-meta';
    meta.textContent = fmtTime(cm.createdAt) + (cm.editedAt ? ' (edited)' : '');

    const actions = document.createElement('div');
    actions.className = 'cm-item-actions';
    const editBtn = document.createElement('button');
    editBtn.className = 'cm-item-btn'; editBtn.textContent = 'Edit'; editBtn.type = 'button';
    editBtn.addEventListener('click', () => editComment(cm));
    const delBtn = document.createElement('button');
    delBtn.className = 'cm-item-btn'; delBtn.textContent = '✕'; delBtn.type = 'button';
    delBtn.addEventListener('click', () => deleteComment(cm.id));
    actions.append(editBtn, delBtn);
    header.append(meta, actions);

    const text = document.createElement('div');
    text.className = 'cm-text';
    text.innerHTML = cm.html;

    item.append(header, text);
    list.appendChild(item);
  });
  c.appendChild(list);
}
function submitComment() {
  const ed = document.getElementById('cm-editor');
  const html = ed.innerHTML.trim();
  if (!html) return;
  MCOMMENTS.unshift({ id: uid(), html, createdAt: new Date().toISOString(), editedAt: null });
  ed.innerHTML = '';
  saveComments();
}
function editComment(cm) {
  const ed = document.getElementById('cm-editor');
  ed.innerHTML = cm.html;
  ed.focus();
  // remove the comment from the list so "Submit" creates a new one; user can manually delete the old one if they want
  // or we could replace-in-place, but edit via delete+new is simpler and preserves full timestamps
  MCOMMENTS = MCOMMENTS.filter(c => c.id !== cm.id);
  renderComments();
}
function deleteComment(cmId) {
  if (!confirm('Delete this comment?')) return;
  MCOMMENTS = MCOMMENTS.filter(c => c.id !== cmId);
  saveComments();
}
async function saveComments() {
  renderComments();
  try {
    const res = await fetch(`/api/applications/${modalApp.id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ comments: MCOMMENTS }),
    });
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    const inApps = APPS.find(x => x.id === modalApp.id); if (inApps) inApps.comments = MCOMMENTS;
  } catch (e) { toast('Comment save failed: ' + e.message); }
}

async function save(id, fields, msg) {
  try {
    const res = await fetch(`/api/applications/${id}`, {
      method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(fields),
    });
    if (!res.ok) throw new Error((await res.json()).error || res.statusText);
    await load();
    toast(msg || 'Saved');
  } catch (e) { toast('Error: ' + e.message); }
}

let toastTimer;
function toast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// Quick search event listener
document.getElementById('quick-search-input').addEventListener('input', performQuickSearch);

// Advanced search filter listeners
['asearch-company', 'asearch-role', 'asearch-jd', 'asearch-status', 'asearch-from', 'asearch-to'].forEach(id => {
  document.getElementById(id).addEventListener('input', performAdvancedSearch);
  document.getElementById(id).addEventListener('change', performAdvancedSearch);
});

load();
</script>
